version: '3.8'
services:

  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lms-app
    container_name: lms-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - lms-network

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: lms-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - lms-network
    depends_on:
      - app

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: lms-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel_lms}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-laravel_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - lms-db-data:/var/lib/mysql
    networks:
      - lms-network

  # Redis for cache and queues
  redis:
    image: redis:alpine
    container_name: lms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - lms-network

networks:
  lms-network:
    driver: bridge

volumes:
  lms-db-data:
    driver: local
